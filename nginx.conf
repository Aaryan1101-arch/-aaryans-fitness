server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # ── SPA routing ──────────────────────────────────────────
    # Any path that isn't a real file falls back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── index.html: never cache ───────────────────────────────
    # The browser must always fetch fresh HTML so updated JS chunks load.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # ── Static assets: immutable 1-year cache ─────────────────
    # CRA appends content hashes to filenames so these never go stale.
    location ~* \.(js|css|woff2?|png|jpg|jpeg|webp|ico|svg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options   "nosniff"                         always;
    add_header X-XSS-Protection         "1; mode=block"                   always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
}
